version: "3"
vars:
  TS_DIR: .
  DASHBOARD_DIR: src/dashboard
tasks:
  data:fetch:
    cmds:
      - bun src/commands/data_fetch.ts {{.SYMBOL}}
  cache:get:
    cmds:
      - bun src/commands/cache_get.ts {{.KEY}}
  cache:set:
    cmds:
      - bun src/commands/cache_set.ts {{.KEY}} {{.VALUE}}
  get:all:
    cmds:
      - bun src/io/get.ts
  jquants:fetch:latest:
    cmds:
      - GET_MODE=jquants bun src/io/get.ts
  edinet:fetch:all:
    cmds:
      - GET_MODE=edinet bun src/io/get.ts
  dashboard:dev:
    cmds:
      - bun --hot src/dashboard/server.ts
  check:
    cmds:
      - task: lint
      - task: format
      - task: typecheck
      - task: test
  lint:
    cmds:
      - bun ./node_modules/@biomejs/biome/bin/biome check src
  format:
    cmds:
      - bun ./node_modules/@biomejs/biome/bin/biome format src --write
  typecheck:
    cmds:
      - bun run typecheck
  test:
    cmds:
      - bun run test
  pipeline:run:
    cmds:
      - bun src/commands/pipeline_run.ts
  run:newalphasearch:
    cmds:
      - ALPHA_LOOP_MAX_CYCLES={{.MAX | default 3}} bun src/commands/pipeline_run.ts
  polymarket:bot:
    cmds:
      - bun src/agents/polymarket_trading_bot.ts
  polymarket:backtest:
    cmds:
      - bun src/agents/polymarket/run_backtest.ts
  websearch:sync:
    cmds:
      - bun src/io/websearch.ts
  clean:
    cmds:
      - rm -rf logs/*
      - rm -rf tmp/*
  bench:edinet:download:
    desc: Download EDINET-Bench dataset from Hugging Face
    cmds:
      - uv run huggingface-cli download SakanaAI/EDINET-Bench --repo-type dataset --local-dir cache/benchmarks/edinet-bench
  bench:edinet:clone:
    desc: Clone EDINET-Bench evaluation repository
    cmds:
      - git clone https://github.com/SakanaAI/EDINET-Bench.git docs/bench/edinet-bench
  bench:edinet:verify:
    desc: Verify EDINET-Bench data access
    cmds:
      - PYTHONPATH=. uv run python src/io/edinet_bench.py
  bench:edinet:stats:
    desc: Calculate EDINET-Bench dataset statistics
    cmds:
      - PYTHONPATH=. uv run python src/commands/edinet_bench_stats.py
