name: Deploy AAARTS strategy dashboard

on:
  push:
    branches: [main]
    paths:
      - "docs/aaarts-dashboard/**"
      - "docs/research/dashboard_registry.json"
      - "docs/research/strategy_registry.json"
      - "docs/research/post_publication_momentum_oos.json"
      - "docs/research/multi_paper_oos_results.json"
      - "src/ontology.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install validation dependencies
        run: npm ci

      - name: Validate strategy registry with Zod
        run: |
          npx tsx -e 'import { readFileSync } from "node:fs"; import { StrategyRegistrySchema } from "./src/ontology.ts"; StrategyRegistrySchema.parse(JSON.parse(readFileSync("docs/research/strategy_registry.json", "utf8"))); console.log("ontology: PASS");'

      - name: Assemble static site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/data
          cp docs/aaarts-dashboard/index.html _site/index.html
          cp docs/aaarts-dashboard/app.js _site/app.js
          cp docs/research/dashboard_registry.json _site/data/research_registry.json
          cp docs/research/strategy_registry.json _site/data/strategy_registry.json
          cp docs/research/post_publication_momentum_oos.json _site/data/post_publication_momentum_oos.json
          cp docs/research/multi_paper_oos_results.json _site/data/multi_paper_oos_results.json
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
