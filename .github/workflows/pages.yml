name: Deploy AAARTS evidence dashboard

on:
  push:
    branches: [main]
    paths:
      - "docs/aaarts-dashboard/**"
      - "docs/research/post_publication_momentum_oos.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/data
          cp docs/aaarts-dashboard/index.html _site/index.html
          cp docs/research/post_publication_momentum_oos.json _site/data/post_publication_momentum_oos.json
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
