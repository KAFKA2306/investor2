name: Validate and deploy AAARTS evidence dashboard

on:
  pull_request:
    paths:
      - "docs/aaarts-dashboard/**"
      - "docs/research/**"
      - "scripts/build_research_verification_manifest.py"
      - "scripts/verify_paper_factor_suite.py"
      - "tests/test_research_verification_manifest.py"
      - "tests/test_paper_factor_suite.py"
      - ".github/workflows/pages.yml"
  push:
    branches: [main]
    paths:
      - "docs/aaarts-dashboard/**"
      - "docs/research/**"
      - "scripts/build_research_verification_manifest.py"
      - "scripts/verify_paper_factor_suite.py"
      - "tests/test_research_verification_manifest.py"
      - "tests/test_paper_factor_suite.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test runner
        run: python -m pip install --disable-pip-version-check pytest

      - name: Validate empirical research artifacts
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/test_paper_factor_suite.py \
            tests/test_repeated_paper_validation.py \
            tests/test_research_verification_manifest.py

      - name: Assemble static site from verified evidence
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/data
          python scripts/build_research_verification_manifest.py \
            --output _site/data/research_verification_manifest.json
          cp docs/aaarts-dashboard/index.html _site/index.html
          touch _site/.nojekyll
          test "$(python -c 'import json; print(json.load(open("_site/data/research_verification_manifest.json"))["summary"]["tested_hypotheses"])')" = "8"
          test "$(python -c 'import json; print(json.load(open("_site/data/research_verification_manifest.json"))["summary"]["confirmed"])')" = "0"

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
