name: Verify live GitHub Pages

on:
  pull_request:
    paths:
      - docs/aaarts-dashboard/**
      - .github/workflows/live-pages-smoke.yml
  push:
    branches:
      - main
    paths:
      - docs/aaarts-dashboard/**
      - .github/workflows/pages.yml
      - .github/workflows/live-pages-smoke.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect GitHub Pages source configuration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            | jq '{html_url, status, build_type, source, public}'

      - name: Wait for Pages propagation on main
        if: github.event_name == 'push'
        run: sleep 30

      - name: Verify production HTML and manifest
        shell: bash
        run: |
          set -euo pipefail
          base="https://kafka2306.github.io/investor2"
          tmp="$(mktemp -d)"

          curl --fail --silent --show-error --location \
            --retry 10 --retry-all-errors --retry-delay 6 \
            -D "$tmp/index.headers" \
            "$base/?smoke=${GITHUB_SHA}" -o "$tmp/index.html"
          sed -n '1,30p' "$tmp/index.headers"
          grep -nE 'theme-color|<title>|--(lavender|rose|mint):' "$tmp/index.html" || true
          grep -F 'content="#fbfaf7"' "$tmp/index.html"
          grep -F -- '--lavender:' "$tmp/index.html"
          grep -F -- '--rose:' "$tmp/index.html"
          grep -F -- '--mint:' "$tmp/index.html"
          grep -F 'id="resultRows"' "$tmp/index.html"
          grep -F 'id="protocolGates"' "$tmp/index.html"

          curl --fail --silent --show-error --location \
            --retry 10 --retry-all-errors --retry-delay 6 \
            "$base/data/research_verification_manifest.json?smoke=${GITHUB_SHA}" \
            -o "$tmp/manifest.json"
          python -m json.tool "$tmp/manifest.json" >/dev/null
          MANIFEST="$tmp/manifest.json" python - <<'PY'
          import json
          import os

          with open(os.environ["MANIFEST"], encoding="utf-8") as handle:
              data = json.load(handle)
          assert data["summary"]["tested_hypotheses"] == 8
          assert data["summary"]["confirmed"] == 0
          PY

          echo "Live Pages smoke test passed: $base/"
