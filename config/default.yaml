# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 📍 UNIFIED DATA PATH ARCHITECTURE (統合データ管理構造)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ⚠️  重要: 以下の paths セクションは「真実の源（SSOT）」です。
#
#   ハードコードされたパスを使用してはいけません！❌
#   代わりに src/system/path_registry.ts から PathRegistry をインポートして使用してください。✅
#
# マスターロケーション: /mnt/d/investor_all_cached_data/
# 詳細は DATA_STRUCTURE.md を参照してください。
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

project:
  name: investor-ts

runtime:
  envFile: ./.env

risk:
  max_portfolio_volatility: 0.15
  kelly_fraction: 0.5
  default_stop_loss: 0.05

allocation:
  min_weight: 0.05
  max_weight: 0.25
  rebalance_threshold: 0.1

polymarket:
  clob_url: "https://clob.polymarket.com"
  chain_id: 137
  discovery_interval_ms: 300000 # 🎀 5分ごとに新マーケットを探索！
  loop_delay_ms: 5000           # 🎀 5秒ごとにスキャン！(プロの釣り師基準)
  arb_threshold: 0.97           # 🎀 0.97 未満（3%以上の乖離）を狙うよっ！
  fee_rate: 0.02
  gas_cost: 0.007
  default_trade_size: 5
  bot:
    minLiquidity: 1000
    maxSpread: 0.1
    minEdge: 0.04
    kellyAlpha: 0.25
    maxExposure: 0.5
    dailyVaRLimit: 0.05

quant:
  polygonscan_api_url: "https://api.polygonscan.com/api"
  imitation_delay_ms: 1000
  target_addresses:
    - "0x019782cab5d844f02bafb71f512758be78579f3c" # majorexploiter
    - "0x2a2C53bD278c04DA9962Fcf96490E17F3DfB9Bc1" # 0x2a2C...Bc1
    - "0x5e524f43357198fa815e6766f02fe686b444b064" # beachboy4 (placeholder address, need to verify)
    - "0x572c8005aa033237175f16de725969b044cd0383" # HorizonSplendidView (placeholder)
    - "0xaab29084bcc42daff9e11b4a5a4cc55cda3eb306" # 432614799197 (placeholder)

alpha:
  les:
    use_basic_columns_only: true
  edinet:
    gates:
      minSignalsPerDay: 4
      maxCorrection90d: 2
      minLiquidityJpy: 100000000
      regimeAllowlist: [RISK_ON, NEUTRAL]
    weights:
      base:
        riskDelta: 0.5
        pead1d: 0.3
        pead5d: 0.2

paths:
  # Core roots (new centralized location)
  data: /mnt/d/investor_all_cached_data/jquants
  logs: /mnt/d/investor_all_cached_data/logs
  verification: /mnt/d/investor_all_cached_data/outputs
  cache: /mnt/d/investor_all_cached_data/cache
  edinet: /mnt/d/investor_all_cached_data/edinet
  preprocessed: /mnt/d/investor_all_cached_data/preprocessed

  # J-Quants market data (under jquants root)
  marketdataRoot: /mnt/d/investor_all_cached_data/jquants
  marketdataPricesGz: /mnt/d/investor_all_cached_data/jquants/raw_stock_price.csv.gz
  marketdataPricesCsv: /mnt/d/investor_all_cached_data/jquants/raw_stock_price.csv
  marketdataFinGz: /mnt/d/investor_all_cached_data/jquants/raw_stock_fin.csv.gz
  marketdataFinCsv: /mnt/d/investor_all_cached_data/jquants/raw_stock_fin.csv
  marketdataListGz: /mnt/d/investor_all_cached_data/jquants/stock_list.csv.gz
  marketdataListCsv: /mnt/d/investor_all_cached_data/jquants/stock_list.csv
  marketdataLabelsGz: /mnt/d/investor_all_cached_data/jquants/stock_labels.csv.gz
  marketdataLabelsCsv: /mnt/d/investor_all_cached_data/jquants/stock_labels.csv
  marketdataStatementsDir: /mnt/d/investor_all_cached_data/jquants/raw_statements

  # Pipeline outputs (under outputs root)
  outputsRoot: /mnt/d/investor_all_cached_data/outputs
  outputsVerificationJson: /mnt/d/investor_all_cached_data/outputs/standard_verification_data.json
  outputsVerificationPlotDir: /mnt/d/investor_all_cached_data/outputs
  outputsPlaybook: /mnt/d/investor_all_cached_data/outputs/playbook.yaml

  # SQLite caches (under cache root)
  cacheDir: /mnt/d/investor_all_cached_data/cache
  cacheMarketSqlite: /mnt/d/investor_all_cached_data/cache/market_cache.sqlite
  cacheMarketdataSqlite: /mnt/d/investor_all_cached_data/cache/marketdata.sqlite
  cacheHttpSqlite: /mnt/d/investor_all_cached_data/cache/http_cache.sqlite
  cacheYahooSqlite: /mnt/d/investor_all_cached_data/cache/yahoo_finance_cache.sqlite
  cacheJquantsPeadSqlite: /mnt/d/investor_all_cached_data/cache/jquants_pead_cache.sqlite
  cacheEdinetSqlite: /mnt/d/investor_all_cached_data/cache/edinet_cache.sqlite
  cacheUqtlSqlite: /mnt/d/investor_all_cached_data/cache/uqtl.sqlite

  # Logical cache (论理キャッシュ) - markets, fundamental, macro separated
  cacheMarketsPolymarket: /mnt/d/investor_all_cached_data/cache/markets/polymarket.sqlite
  cacheMarketsJquants: /mnt/d/investor_all_cached_data/cache/markets/jquants.sqlite
  cacheMarketsYahoo: /mnt/d/investor_all_cached_data/cache/markets/yahoo.sqlite
  cacheFundamentalJquants: /mnt/d/investor_all_cached_data/cache/fundamental/jquants_fin.sqlite
  cacheFundamentalEdinet: /mnt/d/investor_all_cached_data/cache/fundamental/edinet.sqlite
  cacheMacroEstat: /mnt/d/investor_all_cached_data/cache/macro/estat.sqlite
  cacheMacroFred: /mnt/d/investor_all_cached_data/cache/macro/fred.sqlite

  # EDINET data (under edinet root)
  edinetDocsDir: /mnt/d/investor_all_cached_data/edinet/docs
  edinetSearchSqlite: /mnt/d/investor_all_cached_data/edinet/search.sqlite

  # Logs (under logs root)
  logsUnifiedDir: /mnt/d/investor_all_cached_data/logs/unified

  # Documentation (local to repo)
  docsRoot: ./docs
  docsDiagramsDir: ./docs/diagrams
  docsPaperDir: ./docs/paper
  docsNikkiDir: ./docs/nikki
  workflowsDir: /mnt/d/investor_all_cached_data/logs/workflows

providers:
  yfinance:
    enabled: true
  jquants:
    enabled: true
    apiKeyEnv: JQUANTS_API_KEY
  edinet:
    enabled: true
    apiKeyEnv: EDINET_API_KEY
  estat:
    enabled: true
    appIdEnv: ESTAT_APP_ID
  ai:
    enabled: true
    model: gpt-5-nano
    apiKeyEnv: OPENAI_API_KEY
  python:
    uvPath: /root/.local/bin/uv

benchmark:
  foundation:
    noiseThresholdMultiplier: 0.5
    overconfidenceThreshold: 0.8
  orthogonalityThreshold: 0.5

universe:
  symbols: []

execution:
  costs:
    feeBps: 1.0
    slippageBps: 0.5

pipelineBlueprint:
  stateMonitor:
    regimeUpdateFrequencyMinutes: 60
    volatilityLookbackDays: 20
    regimeThreshold: 0.55
    volatilityThreshold: 0.5
  dataAcceptance:
    minQualityScore: 0.82
    minCoverageRate: 0.8
    maxMissingRate: 0.08
    maxLatencyMinutes: 40
    requireLeakFree: true
    minSourceConsistency: 0.01
  researchDesign:
    trainDays: 252
    validationDays: 63
    forwardDays: 63
  verificationAcceptance:
    minSharpe: 0.25
    maxPValue: 0.20
    maxDrawdown: 0.45
  executionConstraints:
    maxPositionWeight: 0.12
    maxTurnover: 0.9
    minLiquidityJpy: 100000000
  executionQuality:
    minFillRate: 0.95
    maxSlippageBps: 2.0
    maxExecutionLatencyMs: 3000
  driftRetraining:
    maxTrackingError: 0.03
    maxRollingDrawdown: 0.12
    minWinRate: 0.48
  alphaLoop:
    maxCycles: 1
    sleepSec: 0
    maxFailures: 1

logging:
  envelope:
    version: v2

database:
  canonicalDb:
    enabled: true
    dualWriteEnabled: true
    host: localhost
    port: 5432
    database: investor
    user: investor
    password: "investor"
    ssl: false

dashboard:
  port: 5173
  apiPort: 8787

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🤖 Foundation Models Registry
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

constants:
  models:
    - amazon-chronos
    - google-timesfm
    - microsoft-timeraf
    - salesforce-moirai
  modelPaths:
    amazon-chronos: amazon/chronos-t5-tiny
    amazon-chronos-mini: amazon/chronos-t5-mini
    google-timesfm: google/timesfm-2.5-200m-pytorch
    microsoft-timeraf: microsoft/finnts
    salesforce-moirai: Salesforce/moirai-1.0-R-tiny
  modelParams:
    context_length: 32
    prediction_length: 1
    history_limit: 512
    window_size: 32
    test_size: 10

models:
  registry_version: "1.0.0"
  updated_at: "2026-02-23"
  items:
    - id: amazon-chronos
      vendor: Amazon
      name: Chronos
      category: time-series-forecasting
      tags: [transformer, zero-shot, foundation-model]
      context7_library_id: /amazon-science/chronos-forecasting
      github: https://github.com/amazon-science/chronos-forecasting
      arxiv: https://arxiv.org/abs/2403.07815
    - id: google-timesfm
      vendor: Google
      name: TimesFM
      category: time-series-forecasting
      tags: [transformer, zero-shot, foundation-model]
      context7_library_id: /google-research/timesfm
      github: https://github.com/google-research/timesfm
      arxiv: https://arxiv.org/abs/2310.10688
    - id: microsoft-timeraf
      vendor: Microsoft
      name: TimeRAF
      category: time-series-forecasting
      tags: [zero-shot, retrieval-augmented, foundation-model]
      context7_library_id: /microsoft/finnts
      github: https://github.com/microsoft/finnts
      arxiv: https://arxiv.org/abs/2412.20810
    - id: salesforce-moirai
      vendor: Salesforce
      name: MOIRAI
      category: time-series-forecasting
      tags: [transformer, zero-shot, foundation-model, any-variate]
      context7_library_id: /salesforce/uni2ts
      github: https://github.com/SalesforceAIResearch/uni2ts
      arxiv: https://arxiv.org/abs/2402.02592
    - id: microsoft-qlib
      vendor: Microsoft
      name: Qlib
      category: machine-learning-research
      tags: [quantitative-investment, ml-platform, alpha-mining]
      context7_library_id: /microsoft/qlib
      github: https://github.com/microsoft/qlib
      arxiv: https://arxiv.org/abs/2009.11189
